name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject secrets
        run: |
          sed -i 's|__CV_ENDPOINT__|${{ secrets.CV_ENDPOINT }}|g' index.html
          sed -i 's|__PROJECT_ID__|${{ secrets.PROJECT_ID }}|g' index.html
          sed -i 's|__TRAINING_KEY__|${{ secrets.TRAINING_KEY }}|g' index.html
          sed -i 's|__ITERATION_ID__|${{ secrets.ITERATION_ID }}|g' index.html

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - uses: actions/deploy-pages@v4
        id: deployment
