<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Florint's Type Check</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            min-height: 100vh;
            background: #000;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4rem 1rem 2rem;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 300;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #888;
            letter-spacing: 0.08em;
            margin-bottom: 3rem;
        }

        .upload-zone {
            width: 100%;
            max-width: 480px;
            border: 1px solid #333;
            padding: 3.5rem 2rem;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.3s ease;
            background: transparent;
        }

        .upload-zone:hover,
        .upload-zone.dragover {
            border-color: #fff;
        }

        .upload-zone .icon {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: #555;
        }

        .upload-zone p {
            font-size: 0.95rem;
            color: #666;
            font-weight: 300;
        }

        .upload-zone p span {
            color: #fff;
            border-bottom: 1px solid #fff;
            cursor: pointer;
        }

        #file-input {
            display: none;
        }

        .preview-container {
            width: 100%;
            max-width: 480px;
            margin-top: 2rem;
            display: none;
        }

        .preview-container.visible {
            display: block;
        }

        .preview-img-wrapper {
            width: 100%;
            overflow: hidden;
            position: relative;
        }

        .preview-img-wrapper img {
            width: 100%;
            display: block;
            filter: grayscale(30%);
        }

        .result-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1.5rem;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.9));
        }

        .result-label {
            font-size: 1.1rem;
            font-weight: 300;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 0.8rem;
        }

        .meter-track {
            width: 100%;
            height: 2px;
            background: #333;
            margin-bottom: 0.6rem;
        }

        .meter-fill {
            height: 100%;
            background: #fff;
            transition: width 1s ease-out;
            width: 0%;
        }

        .result-percentage {
            font-size: 1.6rem;
            font-weight: 200;
            letter-spacing: 0.05em;
        }

        .tags-list {
            margin-top: 0.8rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .tag-pill {
            padding: 0.25rem 0.7rem;
            font-size: 0.75rem;
            font-weight: 400;
            letter-spacing: 0.05em;
            border: 1px solid #444;
            color: #aaa;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 3rem;
        }

        .loading.visible {
            display: block;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 1px solid #333;
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }

        .loading p {
            font-weight: 300;
            color: #666;
            letter-spacing: 0.05em;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-msg {
            color: #fff;
            background: transparent;
            border: 1px solid #555;
            padding: 1rem;
            margin-top: 1.5rem;
            display: none;
            max-width: 480px;
            width: 100%;
            font-weight: 300;
            font-size: 0.9rem;
        }

        .error-msg.visible {
            display: block;
        }

        .try-again {
            margin-top: 2rem;
            padding: 0.7rem 2.5rem;
            background: transparent;
            border: 1px solid #fff;
            color: #fff;
            font-size: 0.85rem;
            font-weight: 400;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.3s, color 0.3s;
            display: none;
        }

        .try-again.visible {
            display: inline-block;
        }

        .try-again:hover {
            background: #fff;
            color: #000;
        }
    </style>
</head>
<body>

    <h1>Type Check</h1>
    <p class="subtitle">Upload a photo. Get a verdict.</p>

    <div class="upload-zone" id="upload-zone">
        <div class="icon">+</div>
        <p>Drag & drop a photo here or <span>browse</span></p>
    </div>
    <input type="file" id="file-input" accept="image/*">

    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>Analyzing</p>
    </div>

    <div class="error-msg" id="error-msg"></div>

    <div class="preview-container" id="preview-container">
        <div class="preview-img-wrapper">
            <img id="preview-img" src="" alt="Uploaded photo">
            <div class="result-overlay" id="result-overlay">
                <div class="result-label" id="result-label"></div>
                <div class="meter-track">
                    <div class="meter-fill" id="meter-fill"></div>
                </div>
                <div class="result-percentage" id="result-percentage"></div>
                <div class="tags-list" id="tags-list"></div>
            </div>
        </div>
    </div>

    <button class="try-again" id="try-again">Try Another</button>

    <script>
        const CONFIG = {
            endpoint: "__CV_ENDPOINT__",
            projectId: "__PROJECT_ID__",
            trainingKey: "__TRAINING_KEY__",
            iterationId: "__ITERATION_ID__"
        };

        const uploadZone = document.getElementById("upload-zone");
        const fileInput = document.getElementById("file-input");
        const loading = document.getElementById("loading");
        const errorMsg = document.getElementById("error-msg");
        const previewContainer = document.getElementById("preview-container");
        const previewImg = document.getElementById("preview-img");
        const resultLabel = document.getElementById("result-label");
        const meterFill = document.getElementById("meter-fill");
        const resultPercentage = document.getElementById("result-percentage");
        const tagsList = document.getElementById("tags-list");
        const tryAgain = document.getElementById("try-again");

        uploadZone.addEventListener("click", () => fileInput.click());

        uploadZone.addEventListener("dragover", (e) => {
            e.preventDefault();
            uploadZone.classList.add("dragover");
        });

        uploadZone.addEventListener("dragleave", () => {
            uploadZone.classList.remove("dragover");
        });

        uploadZone.addEventListener("drop", (e) => {
            e.preventDefault();
            uploadZone.classList.remove("dragover");
            if (e.dataTransfer.files.length) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener("change", () => {
            if (fileInput.files.length) {
                handleFile(fileInput.files[0]);
            }
        });

        tryAgain.addEventListener("click", () => {
            resetUI();
            fileInput.click();
        });

        function resetUI() {
            previewContainer.classList.remove("visible");
            tryAgain.classList.remove("visible");
            errorMsg.classList.remove("visible");
            uploadZone.style.display = "";
            meterFill.style.width = "0%";
        }

        function compressImage(file, maxBytes = 3800000) {
            return new Promise((resolve) => {
                if (file.size <= maxBytes) {
                    resolve(file);
                    return;
                }
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement("canvas");
                    let { width, height } = img;
                    const maxDim = 2048;
                    if (width > maxDim || height > maxDim) {
                        const scale = maxDim / Math.max(width, height);
                        width = Math.round(width * scale);
                        height = Math.round(height * scale);
                    }
                    canvas.width = width;
                    canvas.height = height;
                    canvas.getContext("2d").drawImage(img, 0, 0, width, height);
                    canvas.toBlob((blob) => {
                        if (blob.size > maxBytes) {
                            canvas.toBlob((blob2) => resolve(blob2), "image/jpeg", 0.6);
                        } else {
                            resolve(blob);
                        }
                    }, "image/jpeg", 0.85);
                };
                img.src = URL.createObjectURL(file);
            });
        }

        async function handleFile(file) {
            if (!file.type.startsWith("image/")) {
                showError("Please upload an image file.");
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                previewImg.src = e.target.result;
            };
            reader.readAsDataURL(file);

            uploadZone.style.display = "none";
            errorMsg.classList.remove("visible");
            loading.classList.add("visible");
            previewContainer.classList.remove("visible");
            tryAgain.classList.remove("visible");

            try {
                const compressed = await compressImage(file);
                const result = await classifyImage(compressed);
                showResult(result);
            } catch (err) {
                showError("Something went wrong: " + err.message);
            } finally {
                loading.classList.remove("visible");
            }
        }

        async function classifyImage(file) {
            const url = `${CONFIG.endpoint}/customvision/v3.3/Training/projects/${CONFIG.projectId}/quicktest/image?iterationId=${CONFIG.iterationId}`;

            const response = await fetch(url, {
                method: "POST",
                headers: {
                    "Training-Key": CONFIG.trainingKey,
                    "Content-Type": "application/octet-stream"
                },
                body: file
            });

            if (!response.ok) {
                const text = await response.text();
                throw new Error(`API error ${response.status}: ${text}`);
            }

            return response.json();
        }

        function showResult(data) {
            const predictions = data.predictions || [];
            if (predictions.length === 0) {
                showError("No predictions returned. Make sure the model is trained!");
                return;
            }

            predictions.sort((a, b) => b.probability - a.probability);

            const top = predictions[0];
            const pct = Math.round(top.probability * 100);

            let color, message;
            if (pct >= 80) {
                color = "#fff";
                message = "Absolutely his type";
            } else if (pct >= 60) {
                color = "#aaa";
                message = "Could be his type";
            } else if (pct >= 40) {
                color = "#666";
                message = "Probably not";
            } else {
                color = "#444";
                message = "Not his type";
            }

            const tagName = top.tagName.toLowerCase();
            const isNegativeTag = tagName.includes("not") || tagName.includes("nope") || tagName.includes("negative");

            if (isNegativeTag) {
                if (pct >= 60) {
                    color = "#444";
                    message = "Definitely not his type";
                } else {
                    color = "#aaa";
                    message = "Maybe there's a chance";
                }
            }

            resultLabel.textContent = message;
            resultLabel.style.color = color;
            resultPercentage.textContent = `${top.tagName} — ${pct}%`;
            resultPercentage.style.color = color;

            tagsList.innerHTML = "";
            predictions.forEach(p => {
                const pill = document.createElement("span");
                pill.className = "tag-pill";
                pill.textContent = `${p.tagName}: ${Math.round(p.probability * 100)}%`;
                tagsList.appendChild(pill);
            });

            previewContainer.classList.add("visible");
            tryAgain.classList.add("visible");

            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    meterFill.style.background = color;
                    const meterPct = isNegativeTag ? (100 - pct) : pct;
                    meterFill.style.width = meterPct + "%";
                });
            });
        }

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.add("visible");
            uploadZone.style.display = "";
            tryAgain.classList.add("visible");
        }
    </script>
</body>
</html>
